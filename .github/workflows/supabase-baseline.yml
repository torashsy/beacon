name: Supabase baseline (one-time)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Validate configuration
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_ID"

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      # 本番の現在のスキーマをそのまま最初のマイグレーションとして取り込む。
      # これまでSQL Editorで手動適用してきた分は再実行せず「適用済み」として
      # 履歴に登録される（実際のDDLは実行されない）。
      - name: Pull current schema as the migration baseline
        run: supabase db pull

      - name: Commit baseline migration
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations
          if git diff --cached --quiet; then
            echo "Nothing to commit; baseline already exists."
            exit 0
          fi
          git commit -m "Baseline Supabase migration history from production schema"
          git push
