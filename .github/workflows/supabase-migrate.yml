name: Deploy Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Validate configuration
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_ID"

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      # supabase/migrations/ の全ファイルは冪等に書かれている前提。
      # 既存の8本はCLIの適用履歴に未登録のため初回は「新規」として実行されるが、
      # 内容が冪等（if exists / create or replace 等）なので実害はない想定。
      - name: Push pending migrations
        run: supabase db push
