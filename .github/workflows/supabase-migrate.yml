name: Deploy Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate configuration
        run: test -n "$SUPABASE_DB_URL"

      # 冪等に書く前提ですべてのファイルを毎回流す。CLIのシャドウDB方式
      # (supabase db push/pull) は既存スキーマの一部が migrations/ 側に
      # 記録されておらず再現できないため使わず、直接 psql で適用する。
      - name: Apply all migration files
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in supabase/migrations/*.sql; do
            echo "== Applying $f =="
            psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
