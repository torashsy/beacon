name: Encrypted production backup

on:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Validate configuration
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_ID"
          openssl x509 -in .github/backup-recipient.pem -noout -checkend 2592000

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Export database and Storage
        run: |
          set -euo pipefail
          mkdir -p backup/database backup/storage/avatars
          supabase db dump --linked --role-only --file backup/database/roles.sql
          supabase db dump --linked --file backup/database/schema.sql
          supabase db dump --linked --data-only --use-copy --file backup/database/data.sql
          supabase storage cp --linked --experimental --recursive ss:///avatars backup/storage/avatars

      - name: Build and encrypt archive
        id: archive
        run: |
          set -euo pipefail
          timestamp="$(date -u +'%Y%m%dT%H%M%SZ')"
          {
            echo "created_at_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "project_id=$SUPABASE_PROJECT_ID"
            echo "database_files=$(find backup/database -type f | wc -l)"
            echo "storage_files=$(find backup/storage -type f | wc -l)"
          } > backup/manifest.txt
          find backup -type f ! -name SHA256SUMS -print0 \
            | sort -z \
            | xargs -0 sha256sum > backup/SHA256SUMS
          tar -czf "via-mi-backup-${timestamp}.tar.gz" backup
          openssl cms -encrypt -binary -aes-256-cbc -outform DER \
            -in "via-mi-backup-${timestamp}.tar.gz" \
            -out "via-mi-backup-${timestamp}.tar.gz.cms" \
            .github/backup-recipient.pem
          openssl cms -decrypt -binary -inform DER \
            -in "via-mi-backup-${timestamp}.tar.gz.cms" \
            -recip .github/backup-recipient.pem \
            -inkey /dev/null >/dev/null 2>&1 && exit 1 || true
          rm -rf backup "via-mi-backup-${timestamp}.tar.gz"
          echo "name=via-mi-backup-${timestamp}" >> "$GITHUB_OUTPUT"
          echo "file=via-mi-backup-${timestamp}.tar.gz.cms" >> "$GITHUB_OUTPUT"

      - name: Upload encrypted backup
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.name }}
          path: ${{ steps.archive.outputs.file }}
          if-no-files-found: error
          retention-days: 30
