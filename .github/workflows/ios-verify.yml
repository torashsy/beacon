name: iOS Verify

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "ios/**"
      - "native-shell/**"
      - "capacitor.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ios-verify.yml"
  push:
    branches: [main]
    paths:
      - "ios/**"
      - "native-shell/**"
      - "capacitor.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ios-verify.yml"

permissions:
  contents: read

jobs:
  simulator-build:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run ios:sync
      - name: Build for iOS Simulator without signing
        run: >-
          xcodebuild
          -project ios/App/App.xcodeproj
          -scheme App
          -configuration Debug
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build
