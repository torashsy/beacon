<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7fcff" />
    <title>via-mi</title>
    <style>
      :root { color-scheme: light; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: #f7fcff; color: #183548; }
      main { text-align: center; padding: 24px; }
      .spinner { width: 28px; height: 28px; margin: 0 auto 18px; border: 3px solid #d8edf7; border-top-color: #2eb8e8; border-radius: 50%; animation: spin .75s linear infinite; }
      a { color: #087ea8; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <main>
      <div class="spinner" aria-hidden="true"></div>
      <p>via-miを読み込んでいます</p>
      <a href="https://via-mi.com">再読み込み</a>
    </main>
  </body>
</html>
